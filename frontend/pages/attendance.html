<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance — Attendance Tracker</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/attendance.css">
</head>
<body data-page="attendance">
  <div class="app-layout">
    <aside class="sidebar" id="sidebar" aria-label="Main navigation">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">AT</div>
        <span class="sidebar-logo-text">Attendance</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link" data-nav="dashboard">
          <span class="sidebar-link-icon">📊</span>
          Dashboard
        </a>
        <a href="classes.html" class="sidebar-link" data-nav="classes">
          <span class="sidebar-link-icon">📚</span>
          Classes
        </a>
        <a href="students.html" class="sidebar-link" data-nav="students">
          <span class="sidebar-link-icon">👨‍🎓</span>
          Students
        </a>
        <a href="attendance.html" class="sidebar-link" data-nav="attendance">
          <span class="sidebar-link-icon">✅</span>
          Attendance
        </a>
        <a href="attendance-history.html" class="sidebar-link" data-nav="history">
          <span class="sidebar-link-icon">📅</span>
          History
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="#" class="sidebar-link" id="logoutLink">
          <span class="sidebar-link-icon">🚪</span>
          Logout
        </a>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

    <div class="main-wrapper">
      <header class="navbar">
        <div class="navbar-left">
          <button type="button" class="menu-toggle" id="menuToggle" aria-label="Toggle menu">☰</button>
          <h1 class="page-title">Mark Attendance</h1>
        </div>
        <div class="navbar-right">
          <div class="teacher-profile">
            <div class="teacher-avatar">V</div>
            <span class="teacher-name">Vishesh</span>
          </div>
          <a href="#" class="btn btn-ghost btn-sm" data-logout>Logout</a>
        </div>
      </header>

      <main class="main-content page-enter">
        <div class="attendance-toolbar">
          <div class="toolbar-group">
            <label for="attendanceClass">Class</label>
            <select id="attendanceClass" class="filter-select">
              <option value="">Loading…</option>
            </select>
          </div>
          <div class="toolbar-group">
            <label for="attendanceDate">Date</label>
            <input type="date" id="attendanceDate" class="date-input">
          </div>
          <button type="button" class="btn btn-primary" id="saveAttendanceBtn">Save Attendance</button>
        </div>

        <section class="attendance-calendar card" id="attendanceCalendar" aria-label="Attendance calendar"></section>

        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th>Roll</th>
                <th>Student</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              <tr><td colspan="3" class="empty-state">Select a class to load students</td></tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/attendance.js"></script>
</body>
</html>
